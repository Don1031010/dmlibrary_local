upstream dmlibrary {
    server web:8000;
}

# HTTP — redirect to HTTPS + serve certbot challenge
server {
    listen 80;
    server_name private.marianstreet.tokyo;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name private.marianstreet.tokyo;

    ssl_certificate     /etc/letsencrypt/live/private.marianstreet.tokyo/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/private.marianstreet.tokyo/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass         http://dmlibrary;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
