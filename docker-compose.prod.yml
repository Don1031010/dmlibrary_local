services:
  db:
    image: postgres:16.2
    container_name: dmlibrary-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deanza329 -d dmlibrary"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  dmlibrary:
    build:
      context: .
    container_name: dmlibrary-web
    restart: unless-stopped
    command: /app/entrypoint.prod.sh
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: ${DMLIBRARY_DATABASE_URL}
      DJANGO_SETTINGS_MODULE: mysite.settings.prod
    volumes:
      - dmlibrary_static_volume:/app/staticfiles
      - dmlibrary_media_volume:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: dmlibrary-nginx
    restart: unless-stopped
    depends_on:
      - dmlibrary
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/nginx/conf.d:/etc/nginx/conf.d:ro
      - dmlibrary_static_volume:/app/staticfiles:ro
      - dmlibrary_media_volume:/app/media:ro
      - ./reverse-proxy/nginx/certs:/etc/letsencrypt:ro
      - ./reverse-proxy/certbot/www:/var/www/certbot:ro
    networks:
      - appnet

  certbot:
    image: certbot/certbot
    container_name: dmlibrary-certbot
    volumes:
      - ./reverse-proxy/nginx/certs:/etc/letsencrypt
      - ./reverse-proxy/certbot/www:/var/www/certbot
      - ./reverse-proxy/certbot/log:/var/log/letsencrypt
    networks:
      - appnet

volumes:
  postgres_data:
    external: true
    name: myproject_postgres_data

  dmlibrary_static_volume:
  dmlibrary_media_volume:

networks:
  appnet: