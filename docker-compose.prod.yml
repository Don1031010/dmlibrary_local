services:
  db:
    image: postgres:16.2
    container_name: dmlibrary-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: deanza329
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: dmlibrary_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deanza329 -d dmlibrary_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

  web:
    build:
      context: .
    container_name: dmlibrary-web
    restart: unless-stopped
    command: /app/entrypoint.prod.sh
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgres://deanza329:${POSTGRES_PASSWORD}@db:5432/dmlibrary_db
      DJANGO_SETTINGS_MODULE: mysite.settings.production
    volumes:
      - dmlibrary_static:/app/staticfiles
      - dmlibrary_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: dmlibrary-nginx
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./reverse-proxy/nginx/conf.d:/etc/nginx/conf.d:ro
      - dmlibrary_static:/app/staticfiles:ro
      - dmlibrary_media:/app/media:ro
      - ./reverse-proxy/nginx/certs:/etc/letsencrypt:ro
      - ./reverse-proxy/certbot/www:/var/www/certbot:ro
    networks:
      - appnet

  certbot:
    image: certbot/certbot
    container_name: dmlibrary-certbot
    volumes:
      - ./reverse-proxy/nginx/certs:/etc/letsencrypt
      - ./reverse-proxy/certbot/www:/var/www/certbot
      - ./reverse-proxy/certbot/log:/var/log/letsencrypt
    networks:
      - appnet

volumes:
  postgres_data:
  dmlibrary_static:
  dmlibrary_media:

networks:
  appnet:
